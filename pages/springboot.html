<p class="doc-text">Spring Boot 3.x requires Java 17+ and Jakarta EE 10. It ships with native compilation via GraalVM, virtual thread support, and improved observability.</p>
<h2 class="section-title">REST Controller</h2>
<pre class="code-block"><span class="code-lang">java</span><code>@RestController
@RequestMapping("/api/users")
public class UserController {

    private final UserService userService;

    public UserController(UserService userService) {
        this.userService = userService;
    }

    @GetMapping("/{id}")
    public ResponseEntity&lt;User&gt; getUser(@PathVariable Long id) {
        return userService.findById(id)
            .map(ResponseEntity::ok)
            .orElse(ResponseEntity.notFound().build());
    }

    @PostMapping
    @ResponseStatus(HttpStatus.CREATED)
    public User createUser(@RequestBody @Valid CreateUserDto dto) {
        return userService.create(dto);
    }
}</code></pre>
<h2 class="section-title">Application Properties</h2>
<pre class="code-block"><span class="code-lang">yaml</span><code>spring:
  application:
    name: my-service
  datasource:
    url: jdbc:postgresql://localhost:5432/mydb
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  port: 8080</code></pre>
<div class="callout callout-tip"><strong>💡 Virtual Threads</strong>Add <code>spring.threads.virtual.enabled=true</code> to use JDK 21 virtual threads for Tomcat request handling — zero extra dependency needed.</div>
