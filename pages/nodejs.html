<p class="doc-text">Node.js v22 brings native <code>require()</code> for ES modules, built-in test runner improvements, <code>--run</code> flag for package.json scripts, and V8 12.4.</p>
<h2 class="section-title">HTTP Server</h2>
<pre class="code-block"><span class="code-lang">js</span><code>import { createServer } from "node:http";

const server = createServer((req, res) => {
  res.writeHead(200, { "Content-Type": "application/json" });
  res.end(JSON.stringify({ message: "Hello from Node!" }));
});

server.listen(3000, () =>
  console.log("Server running on http://localhost:3000")
);</code></pre>
<h2 class="section-title">File System (Promises API)</h2>
<pre class="code-block"><span class="code-lang">js</span><code>import { readFile, writeFile } from "node:fs/promises";

const data = await readFile("input.txt", "utf8");
const upper = data.toUpperCase();
await writeFile("output.txt", upper);
console.log("Done!");</code></pre>
<h2 class="section-title">Built-in Test Runner</h2>
<pre class="code-block"><span class="code-lang">js</span><code>import { test, describe } from "node:test";
import assert from "node:assert/strict";

describe("Math utils", () => {
  test("adds two numbers", () => {
    assert.equal(1 + 2, 3);
  });

  test("subtracts correctly", () => {
    assert.equal(5 - 3, 2);
  });
});

// Run: node --test</code></pre>
<div class="callout callout-info"><strong>ℹ️ Node 22</strong>You can now <code>require()</code> synchronous ES modules directly — no need for dynamic <code>import()</code> in most cases.</div>
