<p class="doc-text">Docker packages your application and its dependencies into a portable container image that runs identically on any machine or cloud provider.</p>
<h2 class="section-title">Dockerfile — Node App</h2>
<pre class="code-block"><span class="code-lang">dockerfile</span><code>FROM node:22-alpine AS builder
WORKDIR /app
COPY package*.json ./
RUN npm ci
COPY . .
RUN npm run build

FROM node:22-alpine
WORKDIR /app
COPY --from=builder /app/dist ./dist
COPY --from=builder /app/node_modules ./node_modules
EXPOSE 3000
CMD ["node", "dist/server.js"]</code></pre>
<h2 class="section-title">docker-compose.yml</h2>
<pre class="code-block"><span class="code-lang">yaml</span><code>services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://user:pass@db:5432/mydb
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: mydb
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:</code></pre>
<h2 class="section-title">Useful Commands</h2>
<pre class="code-block"><span class="code-lang">bash</span><code>docker build -t my-app .           # build image
docker run -p 3000:3000 my-app     # run container
docker compose up -d               # start all services
docker compose logs -f             # stream logs
docker exec -it &lt;id&gt; sh           # shell inside container
docker image prune -f              # clean up unused images</code></pre>
<div class="callout callout-tip"><strong>💡 Multi-stage builds</strong>Always use multi-stage builds to keep your final image small — only ship the production artefact, not your build tools.</div>
