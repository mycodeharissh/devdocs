<h2 class="section-title">Type Hints & Generics</h2>
<pre class="code-block"><span class="code-lang">python</span><code># Python 3.12 — new type parameter syntax
type Vector[T] = list[T]

def first[T](items: list[T]) -> T:
    return items[0]

class Stack[T]:
    def __init__(self) -> None:
        self._items: list[T] = []

    def push(self, item: T) -> None:
        self._items.append(item)

    def pop(self) -> T:
        return self._items.pop()</code></pre>
<h2 class="section-title">Async / Await</h2>
<pre class="code-block"><span class="code-lang">python</span><code>import asyncio

async def fetch_data(url: str) -> str:
    await asyncio.sleep(1)   # simulate I/O
    return f"data from {url}"

async def main():
    results = await asyncio.gather(
        fetch_data("https://api.example.com/a"),
        fetch_data("https://api.example.com/b"),
    )
    for r in results:
        print(r)

asyncio.run(main())</code></pre>
<div class="callout callout-tip"><strong>💡 Tip</strong>Use <code>asyncio.gather()</code> to run multiple coroutines concurrently — much faster than sequential awaits for I/O-bound work.</div>
